<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>

    <!--LINKS-->
    <link href="css/output.css" rel="stylesheet">
    <script src="script/criar.js" defer></script>
</head>
<body>

    <header class="h-20 shadow-sm flex items-center justify-start gap-5 pl-4">
        <img src="img/menu.png" id="opcoes" alt="opções" onclick="mostrarOpçoes()" class="scale-90 duration-500">
        <h2 class="text-2xl">CRUD App</h2>
    </header>

    <!--PARTE LATERAL (NAVEGAR ENTRE ÁS PAGINAS-->
    <div id="lateral" class="bg-white w-70 duration-500 absolute -left-full h-dvh shadow-xl float-left pr-4 py-4 max-sm:w-full">
        <p class="mb-8 pl-4 font-bold tracking-wider text-2xl">Selecione:</p>
        <a href="index.html" class="flex items-center gap-2 w-full pl-4 py-2 bg-blue-600 text-white rounded-r-md border">
            <img src="img/pen-tool (1).png" alt="">
            Produtos
        </a>
        <br>
        <a href="criar.html" class="flex items-center gap-2 w-full pl-4 py-2 bg-gray-600 text-white rounded-r-md border">
            <img src="img/book (1).png" alt="">
            Adicionar Produto
        </a>
    </div>
    <!---->

    <div class="h-200 flex justify-center items-center">

        <div class="bg-white w-2/5 max-lg:w-4/5 h-4/5 shadow-xl/30 rounded-xl border p-8 flex flex-col gap-10">

            <h2 class="font-bold tracking-wide text-2xl">Criar Produto</h2>

            
            <div class="flex flex-col gap-4">

                    <p class="hidden py-1 px-4 rounded-md text-white font-medium bg-red-500" id="avisoR">Preencha todos os campos!</p>
                    <p class="hidden py-1 px-4 rounded-md text-white font-medium bg-green-500" id="avisoB">Produto criado com sucesso!</p>

                    <input type="text"  placeholder="Nome" class="px-4 py-3 border rounded-md" id="nome">
                    <input type="number"  placeholder="Preço" class="px-4 py-3 border rounded-md" id="preco">
            </div>
        
            <button class="relative w-full py-3 rounded-lg text-white font-bold tracking-wider bg-blue-600" onclick="adicionarTarefa()">Salvar</button>
        </div>

    </div>
    


    
</body>
</html>
